server {
    listen 80;
    server_name eeg.yzjtiantian.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name eeg.yzjtiantian.cn;

    ssl_certificate     /etc/letsencrypt/live/eeg.yzjtiantian.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eeg.yzjtiantian.cn/privkey.pem;

    # 仅允许 TLS 1.2/1.3，禁用弱密码套件
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /var/www/eeg/web;
    index index.html;

    # 静态文件 (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # WebSocket 反代 (ECS 云端中转)
    location /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WS 关闭缓冲，确保低延迟转发
        proxy_buffering off;
        proxy_read_timeout 86400s;
    }

    # API 预留（实验控制台 HTTP 接口）
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
